name: CI

on:
  push:
    branches: [main, production-overhaul]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.10"
  LLM_PROVIDER: mock

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt --only-binary=:all: || true
          pip install crewai langgraph chromadb fastapi uvicorn pydantic pydantic-settings \
            httpx duckduckgo_search beautifulsoup4 trafilatura lxml \
            textblob textstat loguru \
            prometheus-client prometheus-fastapi-instrumentator \
            python-dotenv numpy pytest pytest-asyncio pytest-cov responses

      - name: Lint with ruff
        run: |
          pip install ruff
          ruff check src/ tests/ --ignore=E501,F401

      - name: Test with pytest
        run: |
          python3 -m pytest tests/ -v --cov=src --cov-report=term --cov-report=xml --tb=short

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          fail_ci_if_error: false
